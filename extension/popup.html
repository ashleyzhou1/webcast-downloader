<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { width: 220px; padding: 14px; font-family: system-ui, sans-serif; font-size: 12px; color: #f0f2f5; background: #0d0f12; margin: 0; }
  .title { font-weight: 600; font-size: 13px; margin-bottom: 8px; color: #4ade80; }
  .row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  .text { color: #8b92a0; line-height: 1.5; }
  .link { color: #4ade80; text-decoration: none; font-size: 11px; display: block; margin-top: 10px; }
</style>
</head>
<body>
<div class="title">🎙️ Webcast Helper</div>
<div class="row"><div class="dot"></div><span class="text">Active — monitoring all tabs</span></div>
<div class="text" style="color:#4a5260;margin-top:8px;line-height:1.6;">
  When you click play on a webcast, this extension automatically captures the media URL and sends it to the downloader.
</div>
<a class="link" href="http://127.0.0.1:8001" target="_blank">Open Downloader →</a>
</body>
</html>
